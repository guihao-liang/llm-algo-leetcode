name: Test Jupyter Notebooks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nbconvert termcolor
        
    - name: Run notebook verification (CPU-only, skip GPU-dependent notebooks)
      run: |
        python verify.py part0_1 --no-build
        python verify.py part2 --no-build
        python verify.py part3 --no-build
        python verify.py part4 --no-build
